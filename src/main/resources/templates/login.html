<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - VibeCloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
          },
          boxShadow: {
            soft: "0 18px 45px rgba(15, 23, 42, 0.08)"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-gray-50 font-sans text-slate-900 antialiased">
  <main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-md">
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/20">
          <i data-lucide="cloud" class="h-8 w-8"></i>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-950">VibeCloud</h1>
        <p class="mt-2 text-sm font-medium text-slate-500">Đăng nhập để quản lý không gian lưu trữ</p>
      </div>

      <form th:action="@{/login}" th:object="${loginRequest}" method="post" class="rounded-2xl border border-slate-200 bg-white p-7 shadow-soft">
        <div th:if="${error}" class="mb-5 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" th:text="${error}">
          Email/tên đăng nhập hoặc mật khẩu không đúng
        </div>

        <div class="space-y-5">
          <div>
            <label for="usernameOrEmail" class="mb-2 block text-sm font-bold text-slate-800">Email/Tên đăng nhập</label>
            <div class="relative">
              <i data-lucide="mail" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input
                id="usernameOrEmail"
                type="text"
                autocomplete="username"
                placeholder="Nhập tên đăng nhập"
                th:field="*{usernameOrEmail}"
                class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              />
            </div>
            <p th:if="${#fields.hasErrors('usernameOrEmail')}" th:errors="*{usernameOrEmail}" class="mt-2 text-xs font-semibold text-rose-600">Vui lòng nhập email hoặc username</p>
          </div>

          <div>
            <label for="password" class="mb-2 block text-sm font-bold text-slate-800">Mật khẩu</label>
            <div class="relative">
              <i data-lucide="lock-keyhole" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input
                id="password"
                type="password"
                autocomplete="current-password"
                placeholder="Nhập mật khẩu"
                th:field="*{password}"
                class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100"
              />
            </div>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-2 text-xs font-semibold text-rose-600">Vui lòng nhập mật khẩu</p>
          </div>

          <div class="flex items-center justify-between gap-4 text-sm">
            <label class="inline-flex items-center gap-2 font-semibold text-slate-600">
              <input type="checkbox" class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
              Ghi nhớ đăng nhập
            </label>
            <a href="#" class="font-bold text-blue-600 transition hover:text-blue-700">Quên mật khẩu?</a>
          </div>

          <button
            type="submit"
            class="inline-flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-blue-600 px-5 text-sm font-extrabold text-white shadow-lg shadow-blue-600/20 transition hover:bg-blue-700 hover:shadow-blue-600/30"
          >
            <i data-lucide="log-in" class="h-5 w-5"></i>
            Đăng nhập
          </button>
        </div>

        <p class="mt-6 text-center text-sm font-medium text-slate-500">
          Chưa có tài khoản?
          <a th:href="@{/register}" class="font-bold text-blue-600 transition hover:text-blue-700">Đăng ký ngay</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>

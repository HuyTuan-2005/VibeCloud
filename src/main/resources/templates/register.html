<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký - VibeCloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
          }
        }
      }
    };
  </script>
</head>
<body class="bg-gray-50 font-sans text-slate-900 antialiased">
  <main class="flex min-h-screen items-center justify-center px-4 py-10">
    <section class="w-full max-w-md">
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/20">
          <i data-lucide="cloud" class="h-8 w-8"></i>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-950">VibeCloud</h1>
        <p class="mt-2 text-sm font-medium text-slate-500">Tạo tài khoản mới</p>
      </div>

      <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="rounded-2xl border border-slate-200 bg-white p-7 shadow-sm">
        <div th:if="${error}" class="mb-5 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-700" th:text="${error}">
          Không thể đăng ký tài khoản
        </div>

        <div class="space-y-5">
          <div>
            <label for="fullName" class="mb-2 block text-sm font-bold text-slate-800">Họ và tên</label>
            <div class="relative">
              <i data-lucide="user" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input id="fullName" type="text" autocomplete="name" placeholder="LÊ HUY TUẤN" th:field="*{fullName}" class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            </div>
            <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="mt-2 text-xs font-semibold text-rose-600">Vui lòng nhập họ và tên</p>
          </div>

          <div>
            <label for="username" class="mb-2 block text-sm font-bold text-slate-800">Tên đăng nhập</label>
            <div class="relative">
              <i data-lucide="badge-user" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input id="username" type="text" autocomplete="username" placeholder="huytuan" th:field="*{username}" class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            </div>
            <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="mt-2 text-xs font-semibold text-rose-600">Tên đăng nhập không hợp lệ</p>
          </div>

          <div>
            <label for="email" class="mb-2 block text-sm font-bold text-slate-800">Địa chỉ Email</label>
            <div class="relative">
              <i data-lucide="mail" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input id="email" type="email" autocomplete="email" placeholder="tuan.lh@huit.edu.vn" th:field="*{email}" class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            </div>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="mt-2 text-xs font-semibold text-rose-600">Email không hợp lệ</p>
          </div>

          <div>
            <label for="password" class="mb-2 block text-sm font-bold text-slate-800">Mật khẩu</label>
            <div class="relative">
              <i data-lucide="lock-keyhole" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input id="password" type="password" autocomplete="new-password" placeholder="Tối thiểu 8 ký tự" th:field="*{password}" class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            </div>
            <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="mt-2 text-xs font-semibold text-rose-600">Mật khẩu không hợp lệ</p>
          </div>

          <div>
            <label for="confirmPassword" class="mb-2 block text-sm font-bold text-slate-800">Xác nhận Mật khẩu</label>
            <div class="relative">
              <i data-lucide="shield-check" class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"></i>
              <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Nhập lại mật khẩu" th:field="*{confirmPassword}" class="h-12 w-full rounded-xl border border-slate-200 bg-white pl-12 pr-4 text-sm font-semibold outline-none transition placeholder:text-slate-400 focus:border-blue-500 focus:ring-4 focus:ring-blue-100" />
            </div>
            <p th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="mt-2 text-xs font-semibold text-rose-600">Vui lòng xác nhận mật khẩu</p>
          </div>

          <button type="submit" class="inline-flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-blue-600 px-5 text-sm font-extrabold text-white shadow-lg shadow-blue-600/20 transition hover:bg-blue-700 hover:shadow-blue-600/30">
            <i data-lucide="user-plus" class="h-5 w-5"></i>
            Đăng ký
          </button>
        </div>

        <p class="mt-6 text-center text-sm font-medium text-slate-500">
          Đã có tài khoản?
          <a th:href="@{/login}" class="font-bold text-blue-600 transition hover:text-blue-700">Đăng nhập ngay</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
